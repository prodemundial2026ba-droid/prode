<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listado de Predicciones — Prode Mundial 2026 - Vaquita -</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBRZz1EfrHAsjMxsgr_d7LIBJoK688OQB4",
    authDomain: "prode-vaquita-2026.firebaseapp.com",
    projectId: "prode-vaquita-2026",
    storageBucket: "prode-vaquita-2026.firebasestorage.app",
    messagingSenderId: "1075416523474",
    appId: "1:1075416523474:web:e1954c26cd41986eb5430b"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._fb = { doc, getDoc, collection, getDocs };
  window._fbReady = true;
  document.dispatchEvent(new Event("firebase-ready"));
</script>
<style>
:root{--negro:#0a0a0a;--verde:#00c853;--verde2:#00e676;--oro:#ffd600;--rojo:#f44336;--gris1:#1a1a1a;--gris2:#252525;--gris3:#333;--gris4:#666;--blanco:#f0f0f0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--negro);color:var(--blanco);font-family:'Barlow',sans-serif;min-height:100vh;}

header{background:linear-gradient(135deg,#0a0a0a 0%,#1a2a1a 50%,#0a0a0a 100%);border-bottom:2px solid var(--verde);padding:0;position:sticky;top:0;z-index:100;}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:16px;}
.logo h1{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:2px;line-height:1;color:var(--blanco);}
.logo h1 span{color:var(--verde);}
.logo p{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--gris4);}
.header-badge{background:var(--gris2);border:1px solid var(--gris3);border-radius:20px;padding:6px 16px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;color:var(--gris4);}
.header-badge span{color:var(--verde);font-weight:700;}

main{max-width:1400px;margin:0 auto;padding:32px 24px;}

/* CONTROLES */
.controles{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:28px;}
.search-inp{background:var(--gris1);border:1px solid var(--gris3);border-radius:8px;padding:10px 16px;color:var(--blanco);font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;outline:none;width:260px;transition:border-color .2s;}
.search-inp:focus{border-color:var(--verde);}
.search-inp::placeholder{color:var(--gris4);}
.filter-btn{background:var(--gris1);border:1px solid var(--gris3);border-radius:6px;padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem;letter-spacing:1px;text-transform:uppercase;color:var(--gris4);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--verde);color:var(--verde);background:#1a0505;}
.controles-right{margin-left:auto;display:flex;gap:10px;align-items:center;}

/* MODO VISTA */
.vista-label{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gris4);}

/* TABLA MODO JUGADOR */
.tabla-wrap{overflow-x:auto;}
.tabla-preds{border-collapse:collapse;width:100%;font-family:'Barlow Condensed',sans-serif;}
.tabla-preds th{font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;color:var(--gris4);padding:10px 8px;border-bottom:1px solid var(--gris3);white-space:nowrap;position:sticky;top:60px;background:var(--negro);z-index:10;}
.tabla-preds th.partido-th{min-width:180px;text-align:left;padding-left:12px;}
.tabla-preds th.jugador-th{min-width:90px;text-align:center;}
.tabla-preds td{padding:7px 8px;border-bottom:1px solid var(--gris2);text-align:center;font-size:0.88rem;}
.tabla-preds td.partido-td{text-align:left;padding-left:12px;white-space:nowrap;font-weight:600;font-size:0.85rem;}
.tabla-preds tr:hover td{background:var(--gris1);}

.grupo-sep td{background:var(--gris1);color:var(--verde);font-family:'Bebas Neue',cursive;font-size:1.1rem;letter-spacing:2px;padding:8px 12px;border-top:1px solid var(--gris3);}

/* Celdas de predicción */
.pred-cell{border-radius:4px;padding:3px 6px;font-family:'Bebas Neue',cursive;font-size:0.95rem;display:inline-block;min-width:36px;}
.pred-5{background:#1a1500;border:1px solid var(--oro);color:var(--oro);}
.pred-3{background:#1a0505;border:1px solid var(--verde);color:var(--verde);}
.pred-0{background:#1a0a0a;border:1px solid #333;color:var(--gris4);}
.pred-vacio{color:var(--gris4);font-size:0.75rem;}
.pred-pendiente{color:var(--gris4);}

.resultado-real{font-family:'Bebas Neue',cursive;font-size:1rem;color:var(--blanco);}
.resultado-pendiente{color:var(--gris4);font-size:0.75rem;}

/* MODO VISTA POR PARTIDO */
.partidos-grid-pub{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;}
.partido-card-pub{background:var(--gris1);border:1px solid var(--gris3);border-radius:10px;overflow:hidden;}
.partido-card-pub .partido-header{padding:12px 16px;border-bottom:1px solid var(--gris3);display:flex;align-items:center;justify-content:space-between;}
.partido-card-pub .partido-vs{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.95rem;}
.partido-card-pub .partido-resultado{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--verde);}
.partido-card-pub .partido-resultado.pendiente{color:var(--gris4);font-size:0.8rem;}
.pred-list{padding:8px 0;}
.pred-row-pub{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;border-bottom:1px solid var(--gris2);}
.pred-row-pub:last-child{border-bottom:none;}
.pred-nombre{font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;flex:1;}
.pred-score{font-family:'Bebas Neue',cursive;font-size:1rem;}
.pred-pts-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:0.85rem;flex-shrink:0;}
.pts-5{background:var(--oro);color:var(--negro);}
.pts-3{background:var(--verde);color:var(--negro);}
.pts-0{background:var(--gris3);color:var(--gris4);}
.pts-null{border:1px dashed var(--gris3);}

.spinner{width:40px;height:40px;border:3px solid var(--gris3);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:80px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

.page-title{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:3px;margin-bottom:6px;}
.page-sub{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--gris4);margin-bottom:28px;}

.tabs-vista{display:flex;gap:0;border-bottom:1px solid var(--gris3);margin-bottom:24px;}
.tv-btn{background:none;border:none;border-bottom:3px solid transparent;padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:1px;text-transform:uppercase;color:var(--gris4);cursor:pointer;transition:all .2s;}
.tv-btn.active{color:var(--verde);border-bottom-color:var(--verde);}

@media(max-width:600px){main{padding:16px 12px;}.controles{gap:8px;}.search-inp{width:100%;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <h1>PRODE<span>2026</span></h1>
      <p>Prode Mundial 2026 - Vaquita -</p>
    </div>
    <div class="header-badge">Jugadores: <span id="hdr-jugadores">–</span> &nbsp;·&nbsp; Partidos con resultado: <span id="hdr-resultados">–</span></div>
  </div>
</header>

<main>
  <div class="page-title">LISTADO DE PREDICCIONES</div>
  <div class="page-sub">Todas las predicciones de los participantes — visible para todos</div>

  <div id="loading"><div class="spinner"></div></div>
  <div id="contenido" style="display:none">

    <div class="tabs-vista">
      <button class="tv-btn active" data-vista="por-partido">Por Partido</button>
      <button class="tv-btn" data-vista="por-jugador">Por Jugador (tabla)</button>
    </div>

    <!-- Filtro grupo (ambas vistas) -->
    <div class="controles">
      <input type="text" class="search-inp" id="search-inp" placeholder="Buscar jugador...">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:2px;color:var(--gris4);text-transform:uppercase">Grupo:</span>
      <button class="filter-btn active" data-grupo="todos">Todos</button>
      <span id="grupo-btns"></span>
    </div>

    <!-- VISTA: POR PARTIDO -->
    <div id="vista-por-partido">
      <div class="partidos-grid-pub" id="grid-partidos"></div>
    </div>

    <!-- VISTA: POR JUGADOR (tabla) -->
    <div id="vista-por-jugador" style="display:none">
      <div class="tabla-wrap">
        <table class="tabla-preds">
          <thead id="thead-jugadores"></thead>
          <tbody id="tbody-jugadores"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script>
const GRUPOS={A:["México","Corea del Sur","Sudáfrica","Rep. Checa"],B:["Canadá","Suiza","Qatar","Bosnia y Herzegovina"],C:["Brasil","Marruecos","Escocia","Haití"],D:["EE.UU.","Paraguay","Australia","Turquía"],E:["Alemania","Ecuador","Costa de Marfil","Curazao"],F:["Países Bajos","Japón","Túnez","Ucrania"],G:["Bélgica","Irán","Egipto","Nueva Zelanda"],H:["España","Uruguay","Arabia Saudí","Cabo Verde"],I:["Francia","Senegal","Noruega","Irak"],J:["Argentina","Austria","Argelia","Jordania"],K:["Portugal","Colombia","Uzbekistán","RD Congo"],L:["Inglaterra","Croacia","Panamá","Ghana"]};
const BANDERAS={"México":"🇲🇽","Corea del Sur":"🇰🇷","Sudáfrica":"🇿🇦","Rep. Checa":"🇨🇿","Canadá":"🇨🇦","Suiza":"🇨🇭","Qatar":"🇶🇦","Bosnia y Herzegovina":"🇧🇦","Brasil":"🇧🇷","Marruecos":"🇲🇦","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haití":"🇭🇹","EE.UU.":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turquía":"🇹🇷","Alemania":"🇩🇪","Ecuador":"🇪🇨","Costa de Marfil":"🇨🇮","Curazao":"🇨🇼","Países Bajos":"🇳🇱","Japón":"🇯🇵","Túnez":"🇹🇳","Ucrania":"🇺🇦","Bélgica":"🇧🇪","Irán":"🇮🇷","Egipto":"🇪🇬","Nueva Zelanda":"🇳🇿","España":"🇪🇸","Uruguay":"🇺🇾","Arabia Saudí":"🇸🇦","Cabo Verde":"🇨🇻","Francia":"🇫🇷","Senegal":"🇸🇳","Noruega":"🇳🇴","Irak":"🇮🇶","Argentina":"🇦🇷","Austria":"🇦🇹","Argelia":"🇩🇿","Jordania":"🇯🇴","Portugal":"🇵🇹","Colombia":"🇨🇴","Uzbekistán":"🇺🇿","RD Congo":"🇨🇩","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Panamá":"🇵🇦","Ghana":"🇬🇭"};
function genFixture(){const f=[];for(const[g,eq]of Object.entries(GRUPOS)){const p=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]],fe=[1,1,2,2,3,3];p.forEach(([i,j],idx)=>f.push({id:`${g}${idx+1}`,grupo:g,fecha:fe[idx],local:eq[i],visitante:eq[j]}));}return f;}
const FIXTURE=genFixture();
function calcPts(pred,real){if(!real||real.gl===null||real.gv===null)return null;if(!pred||pred.gl===null||pred.gv===null)return 0;if(pred.gl===real.gl&&pred.gv===real.gv)return 5;const s=v=>v>0?1:v<0?-1:0;if(s(pred.gl-pred.gv)===s(real.gl-real.gv))return 3;return 0;}
</script>

<script type="module">
let allData = { usuarios:{}, predicciones:{}, resultados:{} };
let vistaActual = "por-partido";
let grupoFiltro = "todos";
let searchFiltro = "";

const waitFB=()=>new Promise(res=>{if(window._fbReady)res();else document.addEventListener("firebase-ready",res,{once:true});});

async function cargarTodo(){
  await waitFB();
  const{collection,getDocs,doc,getDoc}=window._fb;
  const[usersSnap,predsSnap,resSnap]=await Promise.all([
    getDocs(collection(window._db,"usuarios")),
    getDocs(collection(window._db,"predicciones")),
    getDoc(doc(window._db,"resultados","oficial"))
  ]);

  usersSnap.forEach(d=>{if(d.data().activo!==false)allData.usuarios[d.id]=d.data().nombre||d.id;});
  predsSnap.forEach(d=>{if(allData.usuarios[d.id])allData.predicciones[d.id]=d.data();});
  allData.resultados=resSnap.exists()?resSnap.data():{};

  const conRes=Object.keys(allData.resultados).filter(k=>allData.resultados[k].gl!==null).length;
  document.getElementById("hdr-jugadores").textContent=Object.keys(allData.usuarios).length;
  document.getElementById("hdr-resultados").textContent=conRes;

  // Botones de grupo
  const cont=document.getElementById("grupo-btns");
  Object.keys(GRUPOS).forEach(g=>{
    const btn=document.createElement("button");
    btn.className="filter-btn";btn.dataset.grupo=g;btn.textContent=`G ${g}`;
    btn.addEventListener("click",()=>setGrupo(g));
    cont.appendChild(btn);
  });

  document.getElementById("loading").style.display="none";
  document.getElementById("contenido").style.display="block";
  renderVista();
}

function setGrupo(g){
  grupoFiltro=g;
  document.querySelectorAll(".filter-btn[data-grupo]").forEach(b=>{
    b.classList.toggle("active",b.dataset.grupo===g);
  });
  renderVista();
}

document.querySelectorAll(".tv-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    vistaActual=btn.dataset.vista;
    document.querySelectorAll(".tv-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("vista-por-partido").style.display=vistaActual==="por-partido"?"block":"none";
    document.getElementById("vista-por-jugador").style.display=vistaActual==="por-jugador"?"block":"none";
    renderVista();
  });
});

document.getElementById("search-inp").addEventListener("input",e=>{
  searchFiltro=e.target.value.toLowerCase();
  renderVista();
});

// Filtro todos
document.querySelector(".filter-btn[data-grupo='todos']").addEventListener("click",()=>setGrupo("todos"));

function renderVista(){
  if(vistaActual==="por-partido") renderPorPartido();
  else renderPorJugador();
}

function getJugadoresFiltrados(){
  return Object.entries(allData.usuarios)
    .filter(([,nombre])=>!searchFiltro||nombre.toLowerCase().includes(searchFiltro))
    .sort((a,b)=>a[1].localeCompare(b[1]));
}

function getFixtureFiltrado(){
  return FIXTURE.filter(p=>grupoFiltro==="todos"||p.grupo===grupoFiltro);
}

// ---- VISTA POR PARTIDO ----
function renderPorPartido(){
  const cont=document.getElementById("grid-partidos");
  const jugadores=getJugadoresFiltrados();
  const fixture=getFixtureFiltrado();
  let html="";

  fixture.forEach(p=>{
    const real=allData.resultados[p.id]||null;
    const realTxt=real&&real.gl!==null?`${real.gl} - ${real.gv}`:null;
    html+=`<div class="partido-card-pub">
      <div class="partido-header">
        <div class="partido-vs">${BANDERAS[p.local]||''} ${p.local} <span style="color:var(--gris4)">vs</span> ${BANDERAS[p.visitante]||''} ${p.visitante}
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;color:var(--gris4);margin-left:8px">G${p.grupo} · F${p.fecha}</span>
        </div>
        ${realTxt
          ?`<div class="partido-resultado">${realTxt}</div>`
          :`<div class="partido-resultado pendiente">Sin resultado</div>`}
      </div>
      <div class="pred-list">`;

    jugadores.forEach(([uid,nombre])=>{
      const pred=allData.predicciones[uid]?allData.predicciones[uid][p.id]:null;
      const pts=calcPts(pred,real);
      const predTxt=pred&&pred.gl!==null?`${pred.gl}-${pred.gv}`:null;

      let badgeClass="pts-null";let badgeTxt="";
      if(pts===5){badgeClass="pts-5";badgeTxt="5";}
      else if(pts===3){badgeClass="pts-3";badgeTxt="3";}
      else if(pts===0&&real){badgeClass="pts-0";badgeTxt="0";}

      html+=`<div class="pred-row-pub">
        <span class="pred-nombre">${nombre}</span>
        <span class="pred-score" style="color:${predTxt?(pts===5?'var(--oro)':pts===3?'var(--verde)':pts===0&&real?'var(--gris4)':'var(--blanco)'):'var(--gris4)'};margin-right:8px">
          ${predTxt||'<span style="font-size:0.75rem">–</span>'}
        </span>
        <div class="pred-pts-badge ${badgeClass}">${badgeTxt}</div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  cont.innerHTML=html||`<div style="color:var(--gris4);font-family:'Barlow Condensed',sans-serif;padding:40px">No hay datos para mostrar.</div>`;
}

// ---- VISTA POR JUGADOR (tabla) ----
function renderPorJugador(){
  const jugadores=getJugadoresFiltrados();
  const fixture=getFixtureFiltrado();
  const thead=document.getElementById("thead-jugadores");
  const tbody=document.getElementById("tbody-jugadores");

  // Header
  let thHtml=`<tr><th class="partido-th">Partido</th><th>Real</th>`;
  jugadores.forEach(([,nombre])=>{
    const short=nombre.split(" ")[0];
    thHtml+=`<th class="jugador-th" title="${nombre}">${short}</th>`;
  });
  thHtml+=`</tr>`;
  thead.innerHTML=thHtml;

  // Filas
  let tbHtml="";
  let grupoActual="";
  fixture.forEach(p=>{
    if(p.grupo!==grupoActual){
      grupoActual=p.grupo;
      tbHtml+=`<tr class="grupo-sep"><td colspan="${jugadores.length+2}">GRUPO ${grupoActual}</td></tr>`;
    }
    const real=allData.resultados[p.id]||null;
    const realTxt=real&&real.gl!==null?`${real.gl}-${real.gv}`:"–";

    tbHtml+=`<tr>
      <td class="partido-td">${BANDERAS[p.local]||''} ${p.local} <span style="color:var(--gris4)">vs</span> ${BANDERAS[p.visitante]||''} ${p.visitante}</td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1rem;color:${real&&real.gl!==null?'var(--blanco)':'var(--gris4)'}">${realTxt}</td>`;

    jugadores.forEach(([uid])=>{
      const pred=allData.predicciones[uid]?allData.predicciones[uid][p.id]:null;
      const pts=calcPts(pred,real);
      const predTxt=pred&&pred.gl!==null?`${pred.gl}-${pred.gv}`:null;

      let cls="pred-pendiente";let txt=predTxt||"–";
      if(pts===5)cls="pred-5";
      else if(pts===3)cls="pred-3";
      else if(pts===0&&real)cls="pred-0";

      tbHtml+=`<td><span class="pred-cell ${predTxt?cls:''}">${txt}</span></td>`;
    });
    tbHtml+=`</tr>`;
  });
  tbody.innerHTML=tbHtml;
}

document.addEventListener("firebase-ready",cargarTodo);
if(window._fbReady)cargarTodo();
</script>
</body>
</html>
