<style>
/* ====================== VARIABLES ====================== */
:root {
  --negro:    #1a0505;
  --verde:    #e53935;
  --verde2:   #ff6b6b;
  --oro:      #ffc107;
  --rojo:     #ff4757;
  --gris1:    #1f0a0a;
  --gris2:    #2a0f0f;
  --gris3:    #3d1515;
  --gris4:    #8a6a6a;
  --blanco:   #fdf0f0;
  --fuente:   'Barlow', sans-serif;
  --titulo:   'Bebas Neue', cursive;
  --cond:     'Barlow Condensed', sans-serif;
  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--negro);
  color: var(--blanco);
  font-family: var(--fuente);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 900px 600px at 10% 0%, rgba(229,57,53,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 700px 500px at 90% 100%, rgba(229,57,53,0.14) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

header {
  background: linear-gradient(180deg, rgba(6,9,10,0.98) 0%, rgba(14,20,18,0.95) 100%);
  border-bottom: 1px solid rgba(229,57,53,0.25);
  box-shadow: 0 1px 0 rgba(229,57,53,0.08), 0 8px 32px rgba(0,0,0,0.5);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--verde) 40%, var(--verde2) 60%, transparent 100%);
  opacity: 0.7;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  gap: 16px;
}

.logo h1 {
  font-family: var(--titulo);
  font-size: 2.4rem;
  letter-spacing: 3px;
  line-height: 1;
  color: var(--blanco);
}
.logo h1 span {
  color: var(--verde);
  text-shadow: 0 0 24px rgba(229,57,53,0.7), 0 0 48px rgba(229,57,53,0.3);
}
.logo p {
  font-family: var(--cond);
  font-size: 0.72rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gris4);
  margin-top: 1px;
}

.user-info { display: flex; align-items: center; gap: 12px; }

.user-chip {
  background: linear-gradient(135deg, rgba(229,57,53,0.15) 0%, rgba(229,57,53,0.08) 100%);
  border: 1px solid rgba(229,57,53,0.35);
  border-radius: 24px;
  padding: 7px 18px;
  font-family: var(--cond);
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--verde2);
  letter-spacing: 0.5px;
}

.btn-logout {
  background: transparent;
  border: 1px solid rgba(255,71,87,0.3);
  color: rgba(255,71,87,0.6);
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--cond);
  font-size: 0.85rem;
  letter-spacing: 0.5px;
  transition: border-color 160ms var(--ease-out), color 160ms var(--ease-out), background 160ms var(--ease-out), transform 120ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) {
  .btn-logout:hover { border-color: var(--rojo); color: var(--rojo); background: rgba(255,71,87,0.08); }
}
.btn-logout:active { transform: scale(0.96); }

nav.tabs {
  background: rgba(14,20,18,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 99;
  backdrop-filter: blur(12px);
}
nav.tabs ul {
  max-width: 1200px;
  margin: 0 auto;
  list-style: none;
  display: flex;
  padding: 0 28px;
}
nav.tabs li a {
  display: block;
  padding: 15px 24px;
  font-family: var(--cond);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--gris4);
  border-bottom: 2px solid transparent;
  transition: color 160ms var(--ease-out), border-color 160ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) {
  nav.tabs li a:hover { color: rgba(232,245,233,0.75); }
}
nav.tabs li a.active {
  color: var(--verde);
  border-bottom-color: var(--verde);
  text-shadow: 0 0 16px rgba(229,57,53,0.5);
}

main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 28px;
  position: relative;
  z-index: 1;
}
.section { display: none; }
.section.active { display: block; }

#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  position: fixed;
  inset: 0;
  z-index: 200;
  overflow: hidden;
  background: #1a0505;
}

.login-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
.login-orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(229,57,53,0.38) 0%, transparent 70%);
  top: -150px; left: -150px;
  animation: orbFloat 12s ease-in-out infinite alternate;
}
.login-orb-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,107,107,0.28) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: orbFloat 10s ease-in-out infinite alternate-reverse;
}
.login-orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,193,7,0.12) 0%, transparent 70%);
  top: 50%; left: 50%;
  animation: orbFloat3 8s ease-in-out infinite alternate;
}

@keyframes orbFloat {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, -30px) scale(1.1); }
}
@keyframes orbFloat3 {
  0%   { transform: translate(-50%, -50%) scale(1); }
  100% { transform: translate(calc(-50% + 20px), calc(-50% - 20px)) scale(1.15); }
}

#login-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(229,57,53,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(229,57,53,0.06) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(0,0,0,0.6) 20%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(0,0,0,0.6) 20%, transparent 75%);
}

.login-icon {
  font-size: 3.5rem;
  position: relative;
  z-index: 1;
  animation: ballBounce 2s var(--ease-out) both;
  filter: drop-shadow(0 0 20px rgba(229,57,53,0.4));
}
@keyframes ballBounce {
  0%   { opacity: 0; transform: translateY(-30px) scale(0.7); }
  60%  { transform: translateY(4px) scale(1.05); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.login-card {
  background: rgba(14,20,18,0.8);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(229,57,53,0.25);
  border-radius: 24px;
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 0 1px rgba(229,57,53,0.06) inset, 0 40px 80px rgba(0,0,0,0.7), 0 0 120px rgba(229,57,53,0.1);
  animation: cardEnter 600ms var(--ease-out) 200ms both;
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--verde), var(--verde2), transparent);
  border-radius: 1px;
}
@keyframes cardEnter {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(229,57,53,0.1);
  border: 1px solid rgba(229,57,53,0.25);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: var(--cond);
  font-size: 0.72rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--verde);
  margin-bottom: 18px;
}

.login-card h2 {
  font-family: var(--titulo);
  font-size: 5rem;
  letter-spacing: 5px;
  color: var(--blanco);
  line-height: 0.95;
  margin-bottom: 6px;
}
.login-card h2 span {
  color: var(--verde);
  text-shadow: 0 0 40px rgba(229,57,53,0.8), 0 0 80px rgba(229,57,53,0.3);
}
.login-card > p {
  color: var(--gris4);
  font-size: 0.78rem;
  margin: 0 0 36px;
  font-family: var(--cond);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.login-card input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 18px;
  color: var(--blanco);
  font-family: var(--fuente);
  font-size: 1rem;
  margin-bottom: 10px;
  outline: none;
  transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out), background 180ms var(--ease-out);
}
.login-card input:focus {
  border-color: var(--verde);
  background: rgba(229,57,53,0.06);
  box-shadow: 0 0 0 3px rgba(229,57,53,0.15);
}
.login-card input::placeholder { color: var(--gris4); }

.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--verde) 0%, var(--verde2) 100%);
  color: #1a0000;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: var(--titulo);
  font-size: 1.4rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 180ms var(--ease-out), transform 120ms var(--ease-out), box-shadow 180ms var(--ease-out);
  margin-top: 10px;
  box-shadow: 0 4px 24px rgba(229,57,53,0.35), 0 1px 0 rgba(255,255,255,0.15) inset;
}
@media (hover: hover) and (pointer: fine) {
  .btn-login:hover { opacity: 0.9; box-shadow: 0 8px 32px rgba(229,57,53,0.5); }
}
.btn-login:active { transform: scale(0.97); }

.login-error {
  color: var(--rojo);
  font-size: 0.85rem;
  margin-top: 14px;
  font-family: var(--cond);
  min-height: 20px;
  letter-spacing: 0.5px;
}

.grupo-section { margin-bottom: 48px; }
.grupo-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.grupo-label {
  font-family: var(--titulo);
  font-size: 1rem;
  letter-spacing: 2px;
  color: #1a0000;
  background: var(--verde);
  padding: 4px 14px 2px;
  border-radius: 6px;
  box-shadow: 0 0 16px rgba(229,57,53,0.4);
}
.grupo-equipos { font-family: var(--cond); font-size: 0.95rem; color: var(--gris4); letter-spacing: 0.5px; }

.partidos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(430px, 1fr));
  gap: 8px;
}

.partido-card {
  background: linear-gradient(135deg, rgba(24,32,25,0.9) 0%, rgba(14,20,18,0.95) 100%);
  border: 1px solid rgba(255,255,255,0.07);
  border-left: 3px solid transparent;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 180ms var(--ease-out), background 180ms var(--ease-out), transform 150ms var(--ease-out), box-shadow 180ms var(--ease-out);
  opacity: 0;
  transform: translateY(8px);
  animation: cardIn 300ms var(--ease-out) forwards;
}
@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
@media (hover: hover) and (pointer: fine) {
  .partido-card:hover {
    border-color: rgba(229,57,53,0.2);
    border-left-color: rgba(229,57,53,0.4);
    background: linear-gradient(135deg, rgba(229,57,53,0.06) 0%, rgba(14,20,18,0.95) 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(229,57,53,0.1);
  }
}
.partido-card.completado {
  border-left-color: var(--verde);
  background: linear-gradient(135deg, rgba(229,57,53,0.08) 0%, rgba(14,20,18,0.95) 100%);
}
.partido-card.cerrado { opacity: 0.55; pointer-events: none; }

.equipo-nombre { font-family: var(--cond); font-weight: 700; font-size: 1.18rem; flex: 1; text-align: right; letter-spacing: 0.3px; }
.equipo-nombre.visitante { text-align: left; }
.marcador-input { display: flex; align-items: center; gap: 6px; }

.gol-input {
  width: 46px; height: 46px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: var(--blanco);
  font-family: var(--titulo);
  font-size: 1.5rem;
  text-align: center;
  outline: none;
  transition: border-color 160ms var(--ease-out), box-shadow 160ms var(--ease-out), transform 120ms var(--ease-out);
  -moz-appearance: textfield;
}
.gol-input::-webkit-outer-spin-button,
.gol-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.gol-input:focus { border-color: var(--verde); box-shadow: 0 0 0 3px rgba(229,57,53,0.2); transform: scale(1.06); }

.gol-sep { font-family: var(--titulo); font-size: 1.3rem; color: var(--gris4); user-select: none; }

.fecha-badge {
  font-family: var(--cond); font-size: 0.68rem; color: var(--gris4);
  background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08); letter-spacing: 0.5px;
}

.punto-badge { font-family: var(--titulo); font-size: 0.9rem; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.punto-5 { background: var(--oro); color: #1a1200; box-shadow: 0 0 14px rgba(255,193,7,0.5); }
.punto-3 { background: var(--verde); color: #1a0000; box-shadow: 0 0 14px rgba(229,57,53,0.45); }
.punto-0 { background: rgba(255,255,255,0.06); color: var(--gris4); }
.punto-pendiente { border: 1px dashed rgba(255,255,255,0.12); }

.btn-guardar {
  background: linear-gradient(135deg, var(--verde) 0%, var(--verde2) 100%);
  color: #1a0000; border: none; border-radius: 12px; padding: 13px 36px;
  font-family: var(--titulo); font-size: 1.15rem; letter-spacing: 2px; cursor: pointer;
  transition: opacity 160ms var(--ease-out), transform 120ms var(--ease-out), box-shadow 160ms var(--ease-out);
  display: block; margin: 36px auto 0; box-shadow: 0 4px 24px rgba(229,57,53,0.3);
}
@media (hover: hover) and (pointer: fine) {
  .btn-guardar:hover { opacity: 0.88; box-shadow: 0 8px 32px rgba(229,57,53,0.45); }
}
.btn-guardar:active { transform: scale(0.97); }
.btn-guardar:disabled { background: var(--gris3); color: var(--gris4); cursor: not-allowed; box-shadow: none; opacity: 1; }

.save-status { text-align: center; font-family: var(--cond); font-size: 0.85rem; color: var(--verde); margin-top: 10px; min-height: 20px; }

.banner-cerrado {
  background: rgba(255,193,7,0.07); border: 1px solid rgba(255,193,7,0.3);
  border-left: 4px solid var(--oro); border-radius: 14px; padding: 20px 24px;
  margin-bottom: 28px; display: flex; align-items: center; gap: 16px;
}
.banner-cerrado .icon { font-size: 2rem; }
.banner-cerrado p { font-family: var(--cond); }
.banner-cerrado strong { color: var(--oro); font-size: 1.1rem; display: block; }
.banner-cerrado span { color: var(--gris4); font-size: 0.85rem; }

.ranking-table { width: 100%; border-collapse: collapse; }
.ranking-table th { font-family: var(--cond); font-weight: 700; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gris4); padding: 10px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
.ranking-table td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: var(--cond); font-size: 1.15rem; transition: background 140ms var(--ease-out); }
.ranking-table tbody tr { opacity: 0; animation: rankRowIn 320ms var(--ease-out) forwards; }
.ranking-table tbody tr:nth-child(1)  { animation-delay: 0ms; }
.ranking-table tbody tr:nth-child(2)  { animation-delay: 40ms; }
.ranking-table tbody tr:nth-child(3)  { animation-delay: 80ms; }
.ranking-table tbody tr:nth-child(4)  { animation-delay: 120ms; }
.ranking-table tbody tr:nth-child(5)  { animation-delay: 160ms; }
.ranking-table tbody tr:nth-child(6)  { animation-delay: 200ms; }
.ranking-table tbody tr:nth-child(7)  { animation-delay: 240ms; }
.ranking-table tbody tr:nth-child(8)  { animation-delay: 280ms; }
.ranking-table tbody tr:nth-child(n+9) { animation-delay: 300ms; }
@keyframes rankRowIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
@media (hover: hover) and (pointer: fine) { .ranking-table tr:hover td { background: rgba(229,57,53,0.05); } }

.rank-pos { font-family: var(--titulo); font-size: 1.5rem; color: var(--gris4); width: 50px; }
.rank-pos.top1 { color: var(--oro); text-shadow: 0 0 16px rgba(255,193,7,0.6); }
.rank-pos.top2 { color: #c8d6c8; }
.rank-pos.top3 { color: #cd8b3a; }
.rank-nombre { font-weight: 700; color: var(--blanco); font-size: 1.25rem; }
.rank-yo { color: var(--verde2); }
.rank-pts { font-family: var(--titulo); font-size: 1.7rem; color: var(--verde); text-align: right; text-shadow: 0 0 12px rgba(229,57,53,0.3); }
.rank-5s, .rank-3s { font-family: var(--titulo); font-size: 1.15rem; text-align: center; }
.rank-5s { color: var(--oro); }
.rank-3s { color: var(--verde); }

.resultados-grupo { margin-bottom: 36px; }
.resultado-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 140ms var(--ease-out); border-radius: 8px; }
@media (hover: hover) and (pointer: fine) { .resultado-row:hover { background: rgba(229,57,53,0.04); } }
.res-local { text-align: right; flex: 1; font-family: var(--cond); font-weight: 700; font-size: 1.15rem; }
.res-marcadores { display: flex; align-items: center; gap: 8px; font-family: var(--titulo); font-size: 1.2rem; }
.res-real { color: var(--blanco); }
.res-pred { color: var(--gris4); font-size: 0.9rem; }
.res-sep { color: var(--gris4); }
.res-visitante { flex: 1; font-family: var(--cond); font-weight: 700; font-size: 1.15rem; }
.res-pts { width: 40px; text-align: center; }

.spinner { width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--verde); border-radius: 50%; animation: spin .6s linear infinite; margin: 60px auto; box-shadow: 0 0 16px rgba(229,57,53,0.2); }
@keyframes spin { to { transform: rotate(360deg); } }

#toast {
  position: fixed; bottom: 28px; right: 28px;
  background: rgba(14,20,18,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(229,57,53,0.4); border-radius: 12px; padding: 13px 24px;

<!-- LÓGICA PRINCIPAL -->
<script type="module">

let currentUser = null;
let prediccionesCache = {};    // grupos
let resultadosCache = {};      // grupos
let predAbiertoCache = true;   // control global grupos

// Eliminatorias
let elimPartidosCache = {};    // datos de cada partido (equipos, resultado, cerrado)
let elimPredsCache = {};       // predicciones del usuario en elim
let horaServidor = null;       // offset entre hora real y hora local
let countdownTimers = [];      // referencias a setInterval activos

// ---- HASH PIN ----
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

function toast(msg, dur = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

function setTab(name) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll("nav.tabs a").forEach(a => a.classList.remove("active"));
  document.getElementById(`tab-${name}`).classList.add("active");
  document.querySelector(`[data-tab="${name}"]`).classList.add("active");
  if (name === "eliminatorias") renderEliminatorias();
  if (name === "predicciones") renderPredicciones();
  if (name === "resultados") renderResultados();
  if (name === "ranking-grupos") renderRankingGrupos();
  if (name === "ranking-elim") renderRankingElim();
}

// ============================================================
// HORA DEL SERVIDOR — worldtimeapi.org (hora Buenos Aires)
// ============================================================
async function obtenerHoraServidor() {
  try {
    const res = await fetch("https://worldtimeapi.org/api/timezone/America/Argentina/Buenos_Aires");
    const data = await res.json();
    const horaReal = new Date(data.datetime);
    const horaLocal = new Date();
    // offset en ms entre hora real y local del navegador
    horaServidor = horaReal.getTime() - horaLocal.getTime();
  } catch(e) {
    console.warn("worldtimeapi no disponible, usando hora local");
    horaServidor = 0;
  }
}

function ahoraReal() {
  return new Date(Date.now() + (horaServidor || 0));
}

// ============================================================
// AUTH
// ============================================================
async function login(usuario, pass) {
  const db = window._db;
  const { doc, getDoc } = window._firebase;
  const err = document.getElementById("login-error");
  err.textContent = "";
  try {
    const snap = await getDoc(doc(db, "usuarios", usuario.toLowerCase().trim()));
    if (!snap.exists()) { err.textContent = "Usuario no encontrado."; return; }
    const data = snap.data();
    const pinIngresado = await hashPin(String(pass.trim()));
    if (pinIngresado !== data.pin) { err.textContent = "Código incorrecto."; return; }

    currentUser = { id: usuario.toLowerCase().trim(), nombre: data.nombre || usuario, admin: data.admin || false };
    localStorage.setItem("prode_user", JSON.stringify(currentUser));

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("chip-usuario").textContent = currentUser.nombre;

    await cargarDatos();
    setTab("eliminatorias");
  } catch(e) {
    err.textContent = "Error de conexión. Intente nuevamente.";
    console.error(e);
  }
}

async function cargarDatos() {
  const db = window._db;
  const { doc, getDoc, onSnapshot, collection } = window._firebase;

  // Hora del servidor (para countdowns)
  await obtenerHoraServidor();

  // Predicciones grupos
  const pSnap = await getDoc(doc(db, "predicciones", currentUser.id));
  prediccionesCache = pSnap.exists() ? pSnap.data() : {};

  // Resultados grupos
  const rSnap = await getDoc(doc(db, "resultados", "oficial"));
  resultadosCache = rSnap.exists() ? rSnap.data() : {};

  // Estado global grupos (onSnapshot en tiempo real)
  onSnapshot(doc(db, "config", "predicciones"), (snap) => {
    const nuevoEstado = snap.exists() ? snap.data().abierto : true;
    if (nuevoEstado !== predAbiertoCache) {
      predAbiertoCache = nuevoEstado;
      const tabActiva = document.querySelector("nav.tabs a.active");
      if (tabActiva && tabActiva.dataset.tab === "predicciones") renderPredicciones();
    }
  });

  // Predicciones eliminatorias del usuario
  const epSnap = await getDoc(doc(db, "predicciones_elim", currentUser.id));
  elimPredsCache = epSnap.exists() ? epSnap.data() : {};

  // Partidos eliminatorias (onSnapshot en tiempo real — recibe cambios del admin)
  onSnapshot(collection(db, "elim_partidos"), (snap) => {
    snap.forEach(d => { elimPartidosCache[d.id] = d.data(); });
    // Verificar cierres automáticos
    verificarCierresAutomaticos();
    // Si está en tab eliminatorias, re-renderizar
    const tabActiva = document.querySelector("nav.tabs a.active");
    if (tabActiva && tabActiva.dataset.tab === "eliminatorias") renderEliminatorias();
  });
}

// ============================================================
// CIERRE AUTOMÁTICO POR HORA
// Cuando llega la hora de un partido, escribe cerrado:true en Firebase
// Todos los navegadores reciben el cambio via onSnapshot
// ============================================================
function verificarCierresAutomaticos() {
  const ahora = ahoraReal();
  FIXTURE_ELIM.forEach(async (p) => {
    const datos = elimPartidosCache[p.id];
    if (!datos) return; // sin equipos = no existe aún
    if (datos.cerrado) return; // ya cerrado
    const horaPartido = new Date(p.fechaISO);
    if (ahora >= horaPartido) {
      // Llegó la hora — cerrar en Firebase
      const { doc, setDoc } = window._firebase;
      try {
        await setDoc(doc(window._db, "elim_partidos", p.id), { ...datos, cerrado: true });
      } catch(e) { console.error("Error cerrando partido", p.id, e); }
    }
  });
}

// ============================================================
// RENDER ELIMINATORIAS — BRACKET VISUAL
// ============================================================
function renderEliminatorias() {
  const cont = document.getElementById("eliminatorias-content");

  // Limpiar timers anteriores
  countdownTimers.forEach(t => clearInterval(t));
  countdownTimers = [];

  // Agrupar por fase
  const fases = {};
  FASES_ORDEN.forEach(f => { fases[f] = []; });
  FIXTURE_ELIM.forEach(p => { fases[p.fase].push(p); });

  // Ver si hay algún partido disponible
  const hayPartidos = FIXTURE_ELIM.some(p => elimPartidosCache[p.id]);
  if (!hayPartidos) {
    cont.innerHTML = `<div class="elim-empty">
      <div class="icon">⏳</div>
      <div style="font-family:var(--titulo);font-size:1.8rem;letter-spacing:2px;margin-bottom:8px">PRÓXIMAMENTE</div>
      <div>Los cruces de eliminatorias se habilitarán cuando finalice la fase de grupos.</div>
    </div>`;
    return;
  }

  let html = `<div class="elim-header">
    <div class="elim-title">ELIMINATORIAS <span>2026</span></div>
    <div style="font-family:var(--cond);font-size:0.78rem;color:var(--gris4)">
      Resultado a los 90 min · 3pts resultado · 5pts exacto
    </div>
  </div>
  <div class="bracket-wrap"><div class="bracket">`;

  FASES_ORDEN.forEach((fase, fi) => {
    const partidos = fases[fase];
    const label = FASES_LABELS[fase];
    const disponibles = partidos.filter(p => elimPartidosCache[p.id]);
    if (disponibles.length === 0) return;

    html += `<div class="bracket-ronda">
      <div class="ronda-titulo">${label}</div>
      <div class="bracket-partidos">`;

    partidos.forEach((p, pidx) => {
      const datos = elimPartidosCache[p.id];
      if (!datos) return;

      const cerrado = datos.cerrado || false;
      const local = datos.local || null;
      const visitante = datos.visitante || null;
      const real = (datos.gl_real !== undefined && datos.gl_real !== null) ? { gl: datos.gl_real, gv: datos.gv_real } : null;
      const pred = elimPredsCache[p.id] || null;
      const pts = calcularPuntos(pred, real);
      const sinEquipos = !local && !visitante;
      const delay = (fi * 4 + pidx) * 40;

      let cardClass = sinEquipos ? "sin-equipos" : cerrado ? "cerrado" : "abierto";

      // Badge puntos
      let ptsBadge = `<div class="bracket-pts bpts-null"></div>`;
      if (pts === 5) ptsBadge = `<div class="bracket-pts bpts-5">5</div>`;
      else if (pts === 3) ptsBadge = `<div class="bracket-pts bpts-3">3</div>`;
      else if (pts === 0 && real) ptsBadge = `<div class="bracket-pts bpts-0">0</div>`;

      // Inputs predicción
      const glVal = pred && pred.gl !== null ? pred.gl : "";
      const gvVal = pred && pred.gv !== null ? pred.gv : "";
      const ro = cerrado ? "readonly" : "";

      // Equipo local
      const localHtml = local
        ? `<div class="bracket-equipo">${getBandera(local)}<span>${local}</span></div>`
        : `<div class="bracket-equipo tbd">Por definir</div>`;
      const visitanteHtml = visitante
        ? `<div class="bracket-equipo">${getBandera(visitante)}<span>${visitante}</span></div>`
        : `<div class="bracket-equipo tbd">Por definir</div>`;

      // Resultado real si existe
      const realHtml = real
        ? `<div class="bracket-real">${real.gl} - ${real.gv}</div>`
        : `<div class="bracket-real" style="color:var(--gris4)">?</div>`;

      html += `<div class="bracket-card ${cardClass}" data-id="${p.id}" style="animation-delay:${delay}ms">
        <div class="bracket-card-fase">
          <span>${label} · P${p.num}</span>
          ${ptsBadge}
        </div>
        <div class="bracket-equipos">
          <div style="display:flex;align-items:center;gap:6px">
            ${localHtml}
            <div class="bracket-marcador" style="margin-left:auto">
              <input type="number" class="bracket-inp elim-inp" min="0" max="20"
                data-pid="${p.id}" data-lado="gl" value="${glVal}" ${ro} placeholder="–">
              <span class="bracket-sep">:</span>
              <input type="number" class="bracket-inp elim-inp" min="0" max="20"
                data-pid="${p.id}" data-lado="gv" value="${gvVal}" ${ro} placeholder="–">
            </div>
            ${realHtml}
          </div>
          ${visitanteHtml}
        </div>
        <div class="bracket-countdown" id="cd-${p.id}">
          ${cerrado ? '<span class="countdown-cerrado">🔒 Cerrado</span>' : ''}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div></div>`;
  html += `<div class="elim-save-bar">
    <button class="btn-guardar" id="btn-guardar-elim">GUARDAR PREDICCIONES</button>
    <div class="save-status" id="elim-save-status"></div>
  </div>`;

  cont.innerHTML = html;

  // Listeners inputs
  cont.querySelectorAll(".elim-inp").forEach(inp => {
    inp.addEventListener("input", () => {
      const pid = inp.dataset.pid;
      const lado = inp.dataset.lado;
      const val = inp.value === "" ? null : parseInt(inp.value);
      if (!elimPredsCache[pid]) elimPredsCache[pid] = { gl: null, gv: null };
      elimPredsCache[pid][lado] = val;
    });
  });

  document.getElementById("btn-guardar-elim").addEventListener("click", guardarElim);

  // Iniciar countdowns
  iniciarCountdowns();
}

// ============================================================
// COUNTDOWNS
// ============================================================
function iniciarCountdowns() {
  FIXTURE_ELIM.forEach(p => {
    const datos = elimPartidosCache[p.id];
    if (!datos || datos.cerrado) return;

    const horaPartido = new Date(p.fechaISO);
    const el = document.getElementById(`cd-${p.id}`);
    if (!el) return;

    const timer = setInterval(() => {
      const ahora = ahoraReal();
      const diff = horaPartido - ahora;

      if (diff <= 0) {
        clearInterval(timer);
        el.innerHTML = '<span class="countdown-cerrado">🔒 Cerrando...</span>';
        // Disparar cierre en Firebase
        verificarCierresAutomaticos();
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      let txt = "";
      if (d > 0) txt = `${d}d ${h}h ${m}m`;
      else if (h > 0) txt = `${h}h ${m}m ${s}s`;
      else txt = `${m}m ${s}s`;

      const urgente = diff < 3600000; // menos de 1 hora
      el.innerHTML = `<span class="${urgente ? 'countdown-urgente' : 'countdown-abierto'}">⏱ ${txt}</span>`;
    }, 1000);

    countdownTimers.push(timer);
  });
}

// GUARDAR PREDICCIONES ELIMINATORIAS

async function guardarElim() {
  const btn = document.getElementById("btn-guardar-elim");
  const status = document.getElementById("elim-save-status");
  btn.disabled = true; btn.textContent = "GUARDANDO...";
  const { doc, setDoc } = window._firebase;
  try {
    await setDoc(doc(window._db, "predicciones_elim", currentUser.id), elimPredsCache);
    status.textContent = "✓ Predicciones guardadas";
    toast("✓ Guardado");
  } catch(e) {
    status.style.color = "var(--rojo)";
    status.textContent = "✗ Error al guardar.";
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = "GUARDAR PREDICCIONES";
  }
}

function estaAbierto() { return predAbiertoCache; }

function renderPredicciones() {
  const cont = document.getElementById("predicciones-content");
  const abierto = estaAbierto();
  let html = "";

  if (!abierto) {
    html += `<div class="banner-cerrado">
      <span class="icon">🔒</span>
      <div><strong>Predicciones cerradas</strong>
      <span>El Mundial comenzó. Podés ver tus predicciones y el ranking.</span></div>
    </div>`;
  }

  const grupos = {};
  FIXTURE.forEach(p => { if (!grupos[p.grupo]) grupos[p.grupo] = []; grupos[p.grupo].push(p); });

  for (const [letra, partidos] of Object.entries(grupos)) {
    const equipos = GRUPOS[letra];
    html += `<div class="grupo-section">
      <div class="grupo-header">
        <span class="grupo-label">GRUPO ${letra}</span>
        <span class="grupo-equipos">${equipos.map(e => `${getBandera(e)} ${e}`).join(" · ")}</span>
      </div><div class="partidos-grid">`;

    partidos.forEach((p, pidx) => {
      const pred = prediccionesCache[p.id] || null;
      const real = resultadosCache[p.id] || null;
      const pts = calcularPuntos(pred, real);
      const completado = pred && pred.gl !== null && pred.gv !== null;
      let ptsBadge = "";
      if (pts === 5) ptsBadge = `<div class="punto-badge punto-5">5</div>`;
      else if (pts === 3) ptsBadge = `<div class="punto-badge punto-3">3</div>`;
      else if (pts === 0 && real) ptsBadge = `<div class="punto-badge punto-0">0</div>`;
      else ptsBadge = `<div class="punto-badge punto-pendiente"></div>`;
      const glVal = (completado && pred.gl !== undefined) ? pred.gl : "";
      const gvVal = (completado && pred.gv !== undefined) ? pred.gv : "";
      const readonly = !abierto ? "readonly" : "";
      const cardClass = completado ? "completado" : "";
      const delay = Math.min(pidx * 50, 300);
      html += `<div class="partido-card ${cardClass}" data-id="${p.id}" style="animation-delay:${delay}ms">
        ${ptsBadge}
        <span class="equipo-nombre">${getBandera(p.local)} ${p.local}</span>
        <div class="marcador-input">
          <input type="number" class="gol-input" min="0" max="20" data-pid="${p.id}" data-lado="gl" value="${glVal}" ${readonly} placeholder="–">
          <span class="gol-sep">:</span>
          <input type="number" class="gol-input" min="0" max="20" data-pid="${p.id}" data-lado="gv" value="${gvVal}" ${readonly} placeholder="–">
        </div>
        <span class="equipo-nombre visitante">${getBandera(p.visitante)} ${p.visitante}</span>
        <span class="fecha-badge">F${p.fecha}</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (abierto) {
    html += `<button class="btn-guardar" id="btn-guardar-pred">GUARDAR PREDICCIONES</button>
             <div class="save-status" id="save-status"></div>`;
  }
  cont.innerHTML = html;

  if (abierto) {
    cont.querySelectorAll(".gol-input").forEach(inp => {
      inp.addEventListener("input", () => {
        const pid = inp.dataset.pid, lado = inp.dataset.lado;
        const val = inp.value === "" ? null : parseInt(inp.value);
        if (!prediccionesCache[pid]) prediccionesCache[pid] = { gl: null, gv: null };
        prediccionesCache[pid][lado] = val;
        const card = inp.closest(".partido-card");
        const pred = prediccionesCache[pid];
        if (pred.gl !== null && pred.gv !== null) card.classList.add("completado");
        else card.classList.remove("completado");
      });
    });
    document.getElementById("btn-guardar-pred").addEventListener("click", guardarPredicciones);
  }
}

async function guardarPredicciones() {
  const btn = document.getElementById("btn-guardar-pred");
  const status = document.getElementById("save-status");
  btn.disabled = true; btn.textContent = "GUARDANDO...";
  const { doc, setDoc } = window._firebase;
  try {
    await setDoc(doc(window._db, "predicciones", currentUser.id), prediccionesCache);
    status.textContent = "✓ Predicciones guardadas correctamente";
    toast("✓ Guardado");
  } catch(e) {
    status.style.color = "var(--rojo)";
    status.textContent = "✗ Error al guardar. Intentá de nuevo.";
    console.error(e);
  } finally { btn.disabled = false; btn.textContent = "GUARDAR PREDICCIONES"; }
}

async function renderRankingGrupos() {
  const cont = document.getElementById("ranking-grupos-content");
  cont.innerHTML = `<div class="spinner"></div>`;
  const { collection, getDocs } = window._firebase;
  try {
    const [predsSnap, usersSnap] = await Promise.all([
      getDocs(collection(window._db, "predicciones")),
      getDocs(collection(window._db, "usuarios"))
    ]);
    const usuarios = {};
    usersSnap.forEach(d => { const dat=d.data(); if(dat.activo!==false) usuarios[d.id]=dat.nombre||d.id; });
    const ranking = [];
    predsSnap.forEach(d => {
      const uid = d.id;
      if (!usuarios[uid]) return;
      const preds = d.data();
      let pts=0, e5=0, e3=0;
      FIXTURE.forEach(p => {
        const pred=preds[p.id]||null, real=resultadosCache[p.id]||null;
        const p_=calcularPuntos(pred,real);
        if(p_!==null){pts+=p_; if(p_===5)e5++; if(p_===3)e3++;}
      });
      ranking.push({uid,nombre:usuarios[uid],pts,e5,e3});
    });
    ranking.sort((a,b)=>b.pts-a.pts||b.e5-a.e5||b.e3-a.e3);
    cont.innerHTML = renderTablaRanking(ranking, "Grupos");
  } catch(e) {
    cont.innerHTML = `<p style="color:var(--rojo);font-family:var(--cond)">Error cargando ranking.</p>`;
  }
}

// ============================================================
// RANKING ELIMINATORIAS — empate = mismo puesto
// ============================================================
async function renderRankingElim() {
  const cont = document.getElementById("ranking-elim-content");
  cont.innerHTML = `<div class="spinner"></div>`;
  const { collection, getDocs } = window._firebase;
  try {
    const [predsSnap, usersSnap] = await Promise.all([
      getDocs(collection(window._db, "predicciones_elim")),
      getDocs(collection(window._db, "usuarios"))
    ]);
    const usuarios = {};
    usersSnap.forEach(d => { const dat=d.data(); if(dat.activo!==false) usuarios[d.id]=dat.nombre||d.id; });
    const ranking = [];
    predsSnap.forEach(d => {
      const uid = d.id;
      if (!usuarios[uid]) return;
      const preds = d.data();
      let pts=0, e5=0, e3=0;
      FIXTURE_ELIM.forEach(p => {
        const datos=elimPartidosCache[p.id];
        if(!datos) return;
        const real=(datos.gl_real!==undefined&&datos.gl_real!==null)?{gl:datos.gl_real,gv:datos.gv_real}:null;
        const pred=preds[p.id]||null;
        const p_=calcularPuntos(pred,real);
        if(p_!==null){pts+=p_; if(p_===5)e5++; if(p_===3)e3++;}
      });
      ranking.push({uid,nombre:usuarios[uid],pts,e5,e3});
    });

    // Ordenar
    ranking.sort((a,b)=>b.pts-a.pts||b.e5-a.e5);

    // Asignar posiciones — empate = mismo puesto
    let posActual = 1;
    const rankingConPos = ranking.map((r, idx) => {
      if (idx === 0) { r.pos = 1; return r; }
      const prev = ranking[idx-1];
      if (r.pts === prev.pts && r.e5 === prev.e5) {
        r.pos = prev.pos; // mismo puesto
      } else {
        r.pos = idx + 1; // puesto real por cantidad de jugadores adelante
      }
      return r;
    });

    cont.innerHTML = renderTablaRankingElim(rankingConPos);
  } catch(e) {
    cont.innerHTML = `<p style="color:var(--rojo);font-family:var(--cond)">Error cargando ranking.</p>`;
  }
}

function renderTablaRanking(ranking, titulo) {
  let html = `<div style="font-family:var(--cond);font-size:0.75rem;letter-spacing:2px;
    color:var(--gris4);text-transform:uppercase;margin-bottom:16px;">
    Ranking ${titulo} · ${ranking.length} participantes
  </div>
  <table class="ranking-table">
    <thead><tr>
      <th>#</th><th>Jugador</th>
      <th style="text-align:center">🥇</th>
      <th style="text-align:center">✅</th>
      <th style="text-align:right">Puntos</th>
    </tr></thead><tbody>`;

  ranking.forEach((r, idx) => {
    const pos=idx+1;
    const posClass=pos===1?"top1":pos===2?"top2":pos===3?"top3":"";
    const esYo=r.uid===currentUser.id?"rank-yo":"";
    html+=`<tr>
      <td class="rank-pos ${posClass}">${pos}</td>
      <td class="rank-nombre ${esYo}">${r.nombre}${r.uid===currentUser.id?' ◀':''}</td>
      <td class="rank-5s">${r.e5||'–'}</td>
      <td class="rank-3s">${r.e3||'–'}</td>
      <td class="rank-pts">${r.pts}</td>
    </tr>`;
  });
  return html + `</tbody></table>`;
}

function renderTablaRankingElim(ranking) {
  let html = `<div style="font-family:var(--cond);font-size:0.75rem;letter-spacing:2px;
    color:var(--gris4);text-transform:uppercase;margin-bottom:16px;">

  ranking.forEach(r => {
    const posClass=r.pos===1?"top1":r.pos===2?"top2":r.pos===3?"top3":"";
    const esYo=r.uid===currentUser.id?"rank-yo":"";
    html+=`<tr>
      <td class="rank-pos ${posClass}">${r.pos}</td>
      <td class="rank-nombre ${esYo}">${r.nombre}${r.uid===currentUser.id?' ◀':''}</td>
      <td class="rank-5s">${r.e5||'–'}</td>
      <td class="rank-3s">${r.e3||'–'}</td>
      <td class="rank-pts">${r.pts}</td>
    </tr>`;
  });
  return html + `</tbody></table>`;
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("nav.tabs a").forEach(a => {
    a.addEventListener("click", e => { e.preventDefault(); setTab(a.dataset.tab); });
  });

  document.getElementById("btn-logout").addEventListener("click", () => {
    countdownTimers.forEach(t => clearInterval(t));
    currentUser = null;
    localStorage.removeItem("prode_user");
    location.reload();
  });

  ["inp-usuario","inp-pass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
  });
  document.getElementById("btn-ingresar").addEventListener("click", doLogin);

  function doLogin() {
    const u = document.getElementById("inp-usuario").value;
    const p = document.getElementById("inp-pass").value;
    if (!u||!p) { document.getElementById("login-error").textContent="Completá usuario y código."; return; }
    login(u, p);
  }

  const saved = localStorage.getItem("prode_user");
  if (saved) {
    try {
      const u = JSON.parse(saved);
      const tryAutoLogin = () => {
        if (!window._fbReady) { setTimeout(tryAutoLogin, 100); return; }
        currentUser = u;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("chip-usuario").textContent = u.nombre;
        cargarDatos().then(() => setTab("eliminatorias"));
      };
      tryAutoLogin();
    } catch(e) { localStorage.removeItem("prode_user"); }
  }
});
